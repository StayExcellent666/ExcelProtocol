app = "twitch-notifier-bot"
primary_region = "iad"

# Persistent volume — bot DB lives here
[[mounts]]
  source = "twitch_bot_data"
  destination = "/data"

[deploy]
  release_command = "python -c 'from database import Database; Database(\"/data/twitch_bot.db\")'"

# Expose port 8080 for the dashboard web server
[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [services.http_checks]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"
