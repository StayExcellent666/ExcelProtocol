app = "excelprotocol"
primary_region = "fra"

# Persistent volume — bot DB lives here
[[mounts]]
  source = "twitch_bot_data"
  destination = "/data"

# Expose port 8080 for the dashboard web server
[[services]]
  internal_port = 8080
  protocol = "tcp"

  [services.http_options]
    response_timeout = 300
    idle_timeout = 600

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "60s"
    method = "GET"
    path = "/health"
    protocol = "http"
